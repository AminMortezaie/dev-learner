services:
  postgres:
    image: postgres:16-alpine
    container_name: devlearn-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: devlearn
      POSTGRES_PASSWORD: devlearn
      POSTGRES_DB: devlearn
    ports:
      - "5432:5432"
    volumes:
      - devlearn-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U devlearn -d devlearn"]
      interval: 3s
      timeout: 3s
      retries: 20

  api:
    build:
      context: .
      dockerfile: Dockerfile.dev
    platform: linux/amd64
    container_name: devlearn-api
    restart: unless-stopped
    working_dir: /workspace/apps/api
    environment:
      PORT: "5051"
      DATABASE_URL: "postgres://devlearn:devlearn@postgres:5432/devlearn"
    ports:
      - "5051:5051"
    volumes:
      - ./apps/api:/workspace/apps/api
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:5051/api/healthz || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 120s
    command: >
      sh -c "python3 -m venv /opt/api-venv &&
             /opt/api-venv/bin/pip install -q -r requirements.txt &&
             /opt/api-venv/bin/python -m app.cli setup &&
             /opt/api-venv/bin/uvicorn app.main:app --reload --host 0.0.0.0 --port 5051"

  web:
    build:
      context: .
      dockerfile: Dockerfile.dev
    platform: linux/amd64
    container_name: devlearn-web
    restart: unless-stopped
    working_dir: /workspace
    environment:
      PORT: "5174"
      BASE_PATH: "/"
      API_PROXY_TARGET: "http://api:5051"
      CI: "true"
    ports:
      - "5174:5174"
    volumes:
      - ./:/workspace
      - devlearn-node-modules:/workspace/node_modules
      - devlearn-web-nm:/workspace/apps/web/node_modules
      - devlearn-lib-apiclient-nm:/workspace/packages/api-client/node_modules
      - devlearn-lib-contract-nm:/workspace/packages/contract/node_modules
    depends_on:
      api:
        condition: service_healthy
    command: >
      sh -c "pnpm install --frozen-lockfile=false &&
             pnpm --filter @devlearn/web dev"

volumes:
  devlearn-pgdata:
  devlearn-node-modules:
  devlearn-web-nm:
  devlearn-lib-apiclient-nm:
  devlearn-lib-contract-nm:
