openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: DevLearn API — programming language learning platform for senior developers
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: languages
    description: Programming languages and tracks
  - name: topics
    description: Learning topics per language
  - name: resources
    description: External learning resources
  - name: articles
    description: Articles with auto-quiz generation
  - name: quizzes
    description: Quizzes and attempts
  - name: syntax
    description: Syntax lessons with real-world GitHub examples
  - name: projects
    description: Single-file build-from-scratch project walkthroughs
  - name: dashboard
    description: Dashboard summaries and stats

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /languages:
    get:
      operationId: listLanguages
      tags: [languages]
      summary: List all learning tracks (languages + system design)
      responses:
        "200":
          description: List of languages
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Language"

  /topics:
    get:
      operationId: listTopics
      tags: [topics]
      summary: List topics, optionally filtered by language
      parameters:
        - name: languageId
          in: query
          schema:
            type: integer
        - name: difficulty
          in: query
          schema:
            type: string
            enum: [beginner, intermediate, advanced]
      responses:
        "200":
          description: List of topics
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Topic"
    post:
      operationId: createTopic
      tags: [topics]
      summary: Create a new topic
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TopicInput"
      responses:
        "201":
          description: Created topic
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Topic"

  /topics/{id}:
    get:
      operationId: getTopic
      tags: [topics]
      summary: Get a single topic
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Topic
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Topic"
        "404":
          description: Not found

  /resources:
    get:
      operationId: listResources
      tags: [resources]
      summary: List resources, optionally filtered
      parameters:
        - name: languageId
          in: query
          schema:
            type: integer
        - name: topicId
          in: query
          schema:
            type: integer
        - name: type
          in: query
          schema:
            type: string
            enum: [article, video, documentation, github, course, book]
      responses:
        "200":
          description: List of resources
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Resource"
    post:
      operationId: createResource
      tags: [resources]
      summary: Add a new resource
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ResourceInput"
      responses:
        "201":
          description: Created resource
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Resource"

  /resources/{id}:
    get:
      operationId: getResource
      tags: [resources]
      summary: Get a resource by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Resource
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Resource"
        "404":
          description: Not found
    delete:
      operationId: deleteResource
      tags: [resources]
      summary: Delete a resource
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /articles:
    get:
      operationId: listArticles
      tags: [articles]
      summary: List articles
      parameters:
        - name: languageId
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: List of articles
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Article"
    post:
      operationId: createArticle
      tags: [articles]
      summary: Create a new article
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ArticleInput"
      responses:
        "201":
          description: Created article
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Article"

  /articles/polish:
    post:
      operationId: polishArticleContent
      tags: [articles]
      summary: Polish raw article text with AI
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PolishContentInput"
      responses:
        "200":
          description: Polished content
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PolishContentResult"

  /articles/{id}:
    get:
      operationId: getArticle
      tags: [articles]
      summary: Get an article by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Article
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Article"
        "404":
          description: Not found
    delete:
      operationId: deleteArticle
      tags: [articles]
      summary: Delete an article
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /articles/{id}/quiz:
    get:
      operationId: getArticleQuiz
      tags: [articles]
      summary: Get or auto-generate a quiz from an article
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Quiz generated from article
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Quiz"
        "404":
          description: Article not found

  /articles/{id}/quiz/questions:
    post:
      operationId: expandArticleQuiz
      tags: [articles]
      summary: Add more questions to an article quiz
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ExpandArticleQuizInput"
      responses:
        "200":
          description: Quiz with additional questions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Quiz"
        "400":
          description: Invalid request or quiz at maximum size
        "404":
          description: Article or quiz not found

  /quizzes:
    get:
      operationId: listQuizzes
      tags: [quizzes]
      summary: List all quizzes
      parameters:
        - name: languageId
          in: query
          schema:
            type: integer
        - name: topicId
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: List of quizzes
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Quiz"

  /quizzes/{id}:
    get:
      operationId: getQuiz
      tags: [quizzes]
      summary: Get a quiz with all questions
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Quiz with questions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Quiz"
        "404":
          description: Not found

  /quizzes/{id}/attempt:
    post:
      operationId: submitQuizAttempt
      tags: [quizzes]
      summary: Submit answers for a quiz
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/QuizAttemptInput"
      responses:
        "200":
          description: Quiz attempt result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QuizAttemptResult"

  /syntax-lessons:
    get:
      operationId: listSyntaxLessons
      tags: [syntax]
      summary: List syntax lessons, optionally filtered by language
      parameters:
        - name: languageId
          in: query
          schema:
            type: integer
        - name: difficulty
          in: query
          schema:
            type: string
            enum: [beginner, intermediate, advanced]
        - name: category
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of syntax lessons
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SyntaxLesson"

  /syntax-lessons/{id}:
    get:
      operationId: getSyntaxLesson
      tags: [syntax]
      summary: Get a single syntax lesson with full content
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Syntax lesson
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SyntaxLesson"
        "404":
          description: Not found

  /projects:
    get:
      operationId: listProjects
      tags: [projects]
      summary: List build projects, optionally filtered by language
      parameters:
        - name: languageId
          in: query
          schema:
            type: integer
        - name: difficulty
          in: query
          schema:
            type: string
            enum: [beginner, intermediate, advanced]
      responses:
        "200":
          description: List of projects
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Project"

  /projects/{id}:
    get:
      operationId: getProject
      tags: [projects]
      summary: Get a project with all steps and code
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Project with steps
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"
        "404":
          description: Not found

  /projects/by-slug/{languageSlug}/{projectSlug}:
    get:
      operationId: getProjectBySlug
      tags: [projects]
      summary: Get a project by language and project slug
      parameters:
        - name: languageSlug
          in: path
          required: true
          schema:
            type: string
        - name: projectSlug
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Project with steps
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"
        "404":
          description: Not found

  /dashboard/stats:
    get:
      operationId: getDashboardStats
      tags: [dashboard]
      summary: Get overall platform statistics
      responses:
        "200":
          description: Dashboard stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardStats"

  /dashboard/recent-activity:
    get:
      operationId: getRecentActivity
      tags: [dashboard]
      summary: Get recently added content across the platform
      responses:
        "200":
          description: Recent activity feed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecentActivity"

  /dashboard/language-progress:
    get:
      operationId: getLanguageProgress
      tags: [dashboard]
      summary: Get stats broken down per language
      responses:
        "200":
          description: Per-language stats
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/LanguageProgress"

components:
  schemas:
    HealthStatus:
      type: object
      required: [status]
      properties:
        status:
          type: string

    Language:
      type: object
      required: [id, slug, name, description, color, icon]
      properties:
        id:
          type: integer
        slug:
          type: string
        name:
          type: string
        description:
          type: string
        color:
          type: string
        icon:
          type: string
        topicCount:
          type: ["integer", "null"]
        resourceCount:
          type: ["integer", "null"]
        lessonCount:
          type: ["integer", "null"]
        projectCount:
          type: ["integer", "null"]

    Topic:
      type: object
      required: [id, languageId, title, description, difficulty, category]
      properties:
        id:
          type: integer
        languageId:
          type: integer
        languageName:
          type: ["string", "null"]
        title:
          type: string
        description:
          type: string
        difficulty:
          type: string
          enum: [beginner, intermediate, advanced]
        category:
          type: string
        createdAt:
          type: ["string", "null"]

    TopicInput:
      type: object
      required: [languageId, title, description, difficulty, category]
      properties:
        languageId:
          type: integer
        title:
          type: string
        description:
          type: string
        difficulty:
          type: string
          enum: [beginner, intermediate, advanced]
        category:
          type: string

    Resource:
      type: object
      required: [id, title, url, type]
      properties:
        id:
          type: integer
        title:
          type: string
        url:
          type: string
        type:
          type: string
          enum: [article, video, documentation, github, course, book]
        description:
          type: ["string", "null"]
        languageId:
          type: ["integer", "null"]
        languageName:
          type: ["string", "null"]
        topicId:
          type: ["integer", "null"]
        topicTitle:
          type: ["string", "null"]
        tags:
          type: ["string", "null"]
        createdAt:
          type: ["string", "null"]

    ResourceInput:
      type: object
      required: [title, url, type]
      properties:
        title:
          type: string
        url:
          type: string
        type:
          type: string
          enum: [article, video, documentation, github, course, book]
        description:
          type: string
        languageId:
          type: ["integer", "null"]
        topicId:
          type: ["integer", "null"]
        tags:
          type: string

    Article:
      type: object
      required: [id, title, content]
      properties:
        id:
          type: integer
        title:
          type: string
        content:
          type: string
        summary:
          type: ["string", "null"]
        languageId:
          type: ["integer", "null"]
        languageName:
          type: ["string", "null"]
        tags:
          type: ["string", "null"]
        hasQuiz:
          type: ["boolean", "null"]
        createdAt:
          type: ["string", "null"]

    ArticleInput:
      type: object
      required: [title, content]
      properties:
        title:
          type: string
        content:
          type: string
        summary:
          type: string
        languageId:
          type: ["integer", "null"]
        tags:
          type: string
        quizCount:
          type: integer
          minimum: 1
          maximum: 50
          description: Number of quiz questions to auto-generate (default 5)

    PolishContentInput:
      type: object
      required: [content]
      properties:
        content:
          type: string
          minLength: 1

    PolishContentResult:
      type: object
      required: [content]
      properties:
        content:
          type: string

    ExpandArticleQuizInput:
      type: object
      properties:
        additionalCount:
          type: integer
          minimum: 1
          maximum: 20
          default: 5
          description: Number of new questions to add (max 50 total per quiz)

    Quiz:
      type: object
      required: [id, title]
      properties:
        id:
          type: integer
        title:
          type: string
        description:
          type: ["string", "null"]
        articleId:
          type: ["integer", "null"]
        topicId:
          type: ["integer", "null"]
        languageId:
          type: ["integer", "null"]
        languageName:
          type: ["string", "null"]
        questionCount:
          type: ["integer", "null"]
        questions:
          type: array
          items:
            $ref: "#/components/schemas/QuizQuestion"
        createdAt:
          type: ["string", "null"]

    QuizQuestion:
      type: object
      required: [id, quizId, question, options, correctAnswer]
      properties:
        id:
          type: integer
        quizId:
          type: integer
        question:
          type: string
        options:
          type: array
          items:
            type: string
        correctAnswer:
          type: integer
        explanation:
          type: ["string", "null"]
        orderIndex:
          type: ["integer", "null"]

    QuizAttemptInput:
      type: object
      required: [answers]
      properties:
        answers:
          type: array
          items:
            type: object
            required: [questionId, selectedAnswer]
            properties:
              questionId:
                type: integer
              selectedAnswer:
                type: integer

    QuizAttemptResult:
      type: object
      required: [score, totalQuestions, correctCount, passed]
      properties:
        score:
          type: number
        totalQuestions:
          type: integer
        correctCount:
          type: integer
        passed:
          type: boolean
        results:
          type: array
          items:
            type: object
            required: [questionId, correct, correctAnswer]
            properties:
              questionId:
                type: integer
              correct:
                type: boolean
              correctAnswer:
                type: integer
              explanation:
                type: ["string", "null"]

    ProjectSnippet:
      type: object
      required: [path, code]
      properties:
        path:
          type: string
        code:
          type: string
        action:
          type: string
          enum: [create, modify]
        label:
          type: ["string", "null"]

    ProjectStep:
      type: object
      required: [id, projectId, orderIndex, title, goal, instructions, snippets]
      properties:
        id:
          type: integer
        projectId:
          type: integer
        orderIndex:
          type: integer
        title:
          type: string
        goal:
          type: string
        instructions:
          type: string
        snippets:
          type: array
          items:
            $ref: "#/components/schemas/ProjectSnippet"

    Project:
      type: object
      required: [id, languageId, slug, title, description, difficulty, codeLanguage]
      properties:
        id:
          type: integer
        languageId:
          type: integer
        languageName:
          type: ["string", "null"]
        slug:
          type: string
        title:
          type: string
        description:
          type: string
        difficulty:
          type: string
          enum: [beginner, intermediate, advanced]
        codeLanguage:
          type: string
        playgroundUrl:
          type: ["string", "null"]
        stepCount:
          type: ["integer", "null"]
        steps:
          type: ["array", "null"]
          items:
            $ref: "#/components/schemas/ProjectStep"

    SyntaxLesson:
      type: object
      required: [id, languageId, title, concept, difficulty]
      properties:
        id:
          type: integer
        languageId:
          type: integer
        languageName:
          type: ["string", "null"]
        title:
          type: string
        concept:
          type: string
        rawSyntax:
          type: ["string", "null"]
        explanation:
          type: ["string", "null"]
        realWorldExample:
          type: ["string", "null"]
        githubProject:
          type: ["string", "null"]
        githubUrl:
          type: ["string", "null"]
        difficulty:
          type: string
          enum: [beginner, intermediate, advanced]
        category:
          type: ["string", "null"]
        orderIndex:
          type: ["integer", "null"]

    DashboardStats:
      type: object
      required: [totalTopics, totalResources, totalArticles, totalQuizzes, totalSyntaxLessons, totalProjects, totalLanguages]
      properties:
        totalTopics:
          type: integer
        totalResources:
          type: integer
        totalArticles:
          type: integer
        totalQuizzes:
          type: integer
        totalSyntaxLessons:
          type: integer
        totalProjects:
          type: integer
        totalLanguages:
          type: integer

    RecentActivity:
      type: object
      required: [resources, articles, quizzes]
      properties:
        resources:
          type: array
          items:
            $ref: "#/components/schemas/Resource"
        articles:
          type: array
          items:
            $ref: "#/components/schemas/Article"
        quizzes:
          type: array
          items:
            $ref: "#/components/schemas/Quiz"

    LanguageProgress:
      type: object
      required: [languageId, languageName, topicCount, resourceCount, lessonCount, projectCount, quizCount]
      properties:
        languageId:
          type: integer
        languageName:
          type: string
        topicCount:
          type: integer
        resourceCount:
          type: integer
        lessonCount:
          type: integer
        projectCount:
          type: integer
        quizCount:
          type: integer
