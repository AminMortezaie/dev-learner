kind = "web"
previewPath = "/"
title = "DevLearn"
version = "1.0.0"
id = "artifacts/devlearn"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19864

[services.development]
run = "pnpm --filter @workspace/devlearn run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/devlearn", "run", "build" ]
publicDir = "artifacts/devlearn/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19864"
BASE_PATH = "/"
