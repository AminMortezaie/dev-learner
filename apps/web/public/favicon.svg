<svg width="180" height="180" viewBox="0 0 180 180" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="180" y2="180" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FF5C1A"/>
      <stop offset="100%" stop-color="#CC2800"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Badge background -->
  <rect width="180" height="180" rx="38" fill="url(#bg)"/>

  <!-- Subtle inner highlight -->
  <rect x="1" y="1" width="178" height="90" rx="38" fill="white" fill-opacity="0.06"/>

  <!-- > chevron -->
  <path d="M32 55 L78 90 L32 125" stroke="white" stroke-width="15" stroke-linecap="round" stroke-linejoin="round" fill="none" filter="url(#glow)"/>

  <!-- _ cursor bar -->
  <line x1="92" y1="122" x2="150" y2="122" stroke="white" stroke-width="13" stroke-linecap="round" filter="url(#glow)"/>
</svg>
